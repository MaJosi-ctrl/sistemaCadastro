<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <!-- Importa o css-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1> Sistema de Cadastro</h1>
    <!-- Botão que chama a função de cadastro -->
    <button onclick="cadastrarUsuario()">Cadastrar Usuário</button>

    <!-- Botão que chama a função de listagem -->
    <button onclick="listarUsuarios()">Listar Usuários</button>
    <!-- Área onde os usuários serão exibidos -->
    <div id="lista"></div>
    <!-- Importa o JavaScript com a lógica-->
    <script src="script.js"></script>
</body>
</html>
